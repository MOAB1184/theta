<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create School - ThetaSummary Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #121212; color: #e0e0e0; font-family: system-ui, sans-serif; margin: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #1a1a1a; border-radius: 12px; box-shadow: 0 4px 15px #0003; padding: 32px; }
        h1 { color: #fff; font-size: 2rem; margin-bottom: 24px; }
        form { margin-bottom: 32px; }
        label { display: block; margin-bottom: 6px; color: #a0a0a0; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #222; color: #fff; margin-bottom: 18px; font-size: 1rem; }
        .btn { background: #c084fc; color: #fff; border: none; border-radius: 6px; padding: 12px 24px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #a855f7; }
        .school-list { margin-top: 32px; }
        .school-list h2 { color: #fff; font-size: 1.2rem; margin-bottom: 12px; }
        .school-item { background: #242424; border-radius: 6px; padding: 14px 18px; margin-bottom: 10px; }
        .school-name { color: #c084fc; font-weight: 600; font-size: 1.1rem; }
        .school-meta { color: #a0a0a0; font-size: 0.98rem; }
        .back-link { color: #7bb6ff; text-decoration: none; margin-top: 18px; display: inline-block; }
        .back-link:hover { color: #a7d3ff; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create a New School</h1>
        <form method="POST" action="{{ url_for('create_school') }}">
            <label for="name">School Name</label>
            <input type="text" id="name" name="name" required maxlength="100" placeholder="e.g. Lincoln High School">
            <label for="district">District</label>
            <input type="text" id="district" name="district" required maxlength="100" placeholder="e.g. Lincoln Unified School District">
            <label for="state">State</label>
            <select id="state" name="state" required>
                <option value="">Select a state</option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
            </select>
            <button type="submit" class="btn">Create School</button>
        </form>
        <a href="{{ url_for('admin_dashboard') }}" class="back-link">&larr; Back to Admin Dashboard</a>
        <div class="school-list">
            <h2>Existing Schools</h2>
            {% for school in schools %}
            <div class="school-item">
                <span class="school-name">{{ school.name }}</span><br>
                <span class="school-meta">District: {{ school.district }} | State: {{ school.state }}</span>
            </div>
            {% else %}
            <div class="school-item" style="color:#a0a0a0;">No schools created yet.</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
