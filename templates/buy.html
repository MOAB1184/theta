<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Subscription - ThetaSummary</title>
    <style>
        body {
            background: #121212;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 420px;
            margin: 60px auto;
            padding: 32px;
            background: #181a1b;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
        }
        h1 {
            color: #4f8cff;
            text-align: center;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        label {
            color: #a0a0a0;
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="email"], input[type="number"], input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            background: #23272b;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
        }
        .btn {
            width: 100%;
            padding: 12px 0;
            background: #4f8cff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2563eb;
        }
        .divider {
            text-align: center;
            color: #4f8cff;
            margin: 18px 0 10px 0;
            font-weight: 500;
        }
        .back-link {
            display: block;
            text-align: center;
            color: #4f8cff;
            margin-top: 18px;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #ff4d4d;
            margin-bottom: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Buy Subscription</h1>
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/pay">
            <div class="form-group">
                <label for="invite_code">Have an invite code?</label>
                <input type="text" id="invite_code" name="invite_code" placeholder="Enter invite code (optional)">
            </div>
            <div class="divider">OR</div>
            <div class="form-group">
                <label for="card_number">Card Number</label>
                <input type="text" id="card_number" name="card_number" placeholder="1234 5678 9012 3456">
            </div>
            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex:1;">
                    <label for="exp_date">Exp. Date</label>
                    <input type="text" id="exp_date" name="exp_date" placeholder="MM/YY">
                </div>
                <div style="flex:1;">
                    <label for="cvc">CVC</label>
                    <input type="text" id="cvc" name="cvc" placeholder="CVC">
                </div>
            </div>
            <button type="submit" class="btn">Buy Now</button>
        </form>
        <a href="/pricing" class="back-link">&larr; Back to Pricing</a>
    </div>
</body>
</html>
